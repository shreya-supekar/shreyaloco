<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>A-Frame Gesture Locomotion Template</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<script>

AFRAME.registerComponent('gesture-locomotion', {

  schema:{
    acceleration:{default:6},
    maxSpeed:{default:8},
    turnSpeed:{default:2},
    brake:{default:0.92}
  },

  init:function(){

    this.speed = 0;

    this.rightPinch = false;
    this.leftPinch = false;

    this.rightStart = new THREE.Vector3();
    this.leftStart = new THREE.Vector3();

    this.rightNow = new THREE.Vector3();
    this.leftNow = new THREE.Vector3();

    this.rightHand = document.querySelector('#rightHand');
    this.leftHand = document.querySelector('#leftHand');

    // RIGHT HAND EVENTS
    this.rightHand.addEventListener("pinchstarted", () => {
      this.rightPinch = true;
      this.rightHand.object3D.getWorldPosition(this.rightStart);
    });

    this.rightHand.addEventListener("pinchended", () => {
      this.rightPinch = false;
    });

    // LEFT HAND EVENTS
    this.leftHand.addEventListener("pinchstarted", () => {
      this.leftPinch = true;
      this.leftHand.object3D.getWorldPosition(this.leftStart);
    });

    this.leftHand.addEventListener("pinchended", () => {
      this.leftPinch = false;
    });
  },

  tick:function(time,delta){

    if(!delta) return;
    const dt = delta/1000;

    /* ---------- THROTTLE ---------- */

    if(this.rightPinch){

      this.rightHand.object3D.getWorldPosition(this.rightNow);

      let dist = this.rightNow.distanceTo(this.rightStart);

      let throttle = Math.min(dist*3,1);

      this.speed += throttle*this.data.acceleration*dt;

    }

    /* ---------- STEERING ---------- */

    if(this.leftPinch){

      this.leftHand.object3D.getWorldPosition(this.leftNow);

      let startLocal = this.el.object3D.worldToLocal(this.leftStart.clone());
      let nowLocal = this.el.object3D.worldToLocal(this.leftNow.clone());

      let diff = nowLocal.x - startLocal.x;

      this.el.object3D.rotation.y -= diff*this.data.turnSpeed*dt;

    }

    /* ---------- BRAKE ---------- */

    if(!this.rightPinch){
      this.speed *= this.data.brake;
    }

    this.speed = Math.min(this.speed,this.data.maxSpeed);

    if(this.speed < 0.01){
      this.speed = 0;
    }

    /* ---------- FORWARD MOVEMENT ---------- */

    if(this.speed>0){

      let dir = new THREE.Vector3(0,0,-1);

      dir.applyQuaternion(this.el.object3D.quaternion);

      dir.y = 0;

      dir.normalize();

      this.el.object3D.position.addScaledVector(dir,this.speed*dt);

    }

  }

});

</script>
</head>

<body>

<a-scene background="color:#111">

<!-- PLAYER RIG -->

<a-entity id="rig" position="0 0 0" gesture-locomotion>

<a-camera position="0 1.6 0"></a-camera>

<a-entity id="leftHand"
hand-tracking-controls="hand: left">
</a-entity>

<a-entity id="rightHand"
hand-tracking-controls="hand: right">
</a-entity>

</a-entity>


<!-- GROUND -->

<a-plane
rotation="-90 0 0"
width="2000"
height="2000"
color="#222">
</a-plane>


<!-- MOVEMENT REFERENCE OBJECTS -->

<a-box position="0 1 -10" color="#FF0055"></a-box>
<a-box position="5 1 -20" color="#00FFAA"></a-box>
<a-box position="-5 1 -30" color="#55AAFF"></a-box>
<a-box position="3 1 -40" color="#FFFF00"></a-box>
<a-box position="-3 1 -50" color="#FF8800"></a-box>

<a-light type="ambient" intensity="1"></a-light>

</a-scene>

</body>
</html>
