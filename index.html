<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VR Gesture Locomotion</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<script>

AFRAME.registerComponent("gesture-locomotion",{

schema:{
acceleration:{default:10},
maxSpeed:{default:6},
turnSpeed:{default:2},
drag:{default:0.95}
},

init:function(){

this.speed=0

this.rightHand=document.querySelector("#rightHand")
this.leftHand=document.querySelector("#leftHand")

this.prevRight=new THREE.Vector3()
this.currRight=new THREE.Vector3()

this.prevLeft=new THREE.Vector3()
this.currLeft=new THREE.Vector3()

},

tick:function(time,delta){

if(!delta) return
const dt=delta/1000

/* --------- RIGHT HAND THROTTLE --------- */

this.rightHand.object3D.getWorldPosition(this.currRight)

let forwardMove=this.currRight.z-this.prevRight.z

if(forwardMove<-0.002){

let throttle=Math.min(Math.abs(forwardMove)*40,1)

this.speed+=throttle*this.data.acceleration*dt

}

this.prevRight.copy(this.currRight)


/* --------- LEFT HAND STEERING --------- */

this.leftHand.object3D.getWorldPosition(this.currLeft)

let steer=this.currLeft.x-this.prevLeft.x

if(Math.abs(steer)>0.001){

this.el.object3D.rotation.y-=steer*this.data.turnSpeed*5

}

this.prevLeft.copy(this.currLeft)


/* --------- SPEED LIMIT --------- */

if(this.speed>this.data.maxSpeed){
this.speed=this.data.maxSpeed
}


/* --------- DRAG --------- */

this.speed*=this.data.drag

if(this.speed<0.01){
this.speed=0
}


/* --------- FORWARD MOVEMENT --------- */

if(this.speed>0){

let dir=new THREE.Vector3(0,0,-1)

dir.applyQuaternion(this.el.object3D.quaternion)

dir.normalize()

this.el.object3D.position.addScaledVector(dir,this.speed*dt)

}

}

})

</script>

</head>


<body>

<a-scene background="color:#101010">

<!-- PLAYER -->

<a-entity id="rig" gesture-locomotion>

<a-camera position="0 1.6 0"></a-camera>

<a-entity id="leftHand"
hand-tracking-controls="hand: left">
</a-entity>

<a-entity id="rightHand"
hand-tracking-controls="hand: right">
</a-entity>

</a-entity>


<!-- GROUND -->

<a-plane
rotation="-90 0 0"
width="2000"
height="2000"
color="#222">
</a-plane>


<!-- MOVEMENT REFERENCE OBJECTS -->

<a-box position="0 1 -10" color="#ff0055"></a-box>
<a-box position="4 1 -20" color="#00ffaa"></a-box>
<a-box position="-4 1 -30" color="#5599ff"></a-box>
<a-box position="2 1 -40" color="#ffff00"></a-box>
<a-box position="-2 1 -50" color="#ff8800"></a-box>

<a-light type="ambient" intensity="1"></a-light>

</a-scene>

</body>
</html>
