<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>A-Frame VR: Motorcycle Hand Rev Locomotion</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

    <script>
      /**
       * CUSTOM COMPONENT: forest-scenery
       * Generates a road and trees.
       */
      AFRAME.registerComponent('forest-scenery', {
        init: function () {
          for (let i = 0; i < 200; i++) {
            let zOffset = - (i * 12); 
            this.createTree(-5, zOffset);
            this.createTree(5, zOffset);
          }
          for (let i = 0; i < 400; i++) {
            let x = (Math.random() - 0.5) * 400;
            let z = (Math.random() - 0.5) * 400;
            if (Math.abs(x) < 6) continue;
            this.createTree(x, z);
          }
        },
        createTree: function(x, z) {
          let tree = document.createElement('a-entity');
          tree.setAttribute('position', `${x} 0 ${z}`);
          
          let trunk = document.createElement('a-cylinder');
          trunk.setAttribute('radius', '0.25');
          trunk.setAttribute('height', '2');
          trunk.setAttribute('color', '#4A3728');
          trunk.setAttribute('position', '0 1 0');
          
          let leaves = document.createElement('a-cone');
          leaves.setAttribute('radius-bottom', '1.8');
          leaves.setAttribute('height', '4');
          leaves.setAttribute('color', '#2E5339');
          leaves.setAttribute('position', '0 4 0');
          
          tree.appendChild(trunk);
          tree.appendChild(leaves);
          this.el.appendChild(tree);
        }
      });

      /**
       * CUSTOM COMPONENT: motorcycle-rig
       * Vector-based approach for flawless rotation tracking.
       */
      AFRAME.registerComponent('motorcycle-rig', {
        schema: {
          acceleration: { type: 'number', default: 20.0 },
          maxSpeed: { type: 'number', default: 30.0 },
          turnSensitivity: { type: 'number', default: 1.5 },
          deadzone: { type: 'number', default: 0.04 } // LOWERED: Makes it much easier to trigger the throttle
        },

        init: function () {
          this.speed = 0;
          
          this.rightPinched = false;
          this.leftPinched = false;
          
          this.initialRightPitch = 0; 
          this.initialLeftRoll = 0;   
          
          this.rightHand = document.querySelector('#rightHand');
          this.leftHand = document.querySelector('#leftHand');
          this.odoText = document.querySelector('#odo-text');

          // Helper: Gets the Y-component of the hand's forward vector (-1 to 1)
          // Twisting your wrist up (revving) pushes this value higher.
          this.getHandPitch = function(handEl) {
            let dir = new THREE.Vector3(0, 0, -1);
            dir.applyQuaternion(handEl.object3D.quaternion);
            return dir.y; 
          };

          // Helper: Gets the X-component of the hand's UP vector (-1 to 1)
          // Tilting your wrist left/right changes this value.
          this.getHandRoll = function(handEl) {
            let up = new THREE.Vector3(0, 1, 0);
            up.applyQuaternion(handEl.object3D.quaternion);
            return up.x; 
          };

          // RIGHT HAND EVENTS (Throttle)
          this.rightHand.addEventListener('pinchstarted', () => {
            this.rightPinched = true;
            this.initialRightPitch = this.getHandPitch(this.rightHand);
          });
          this.rightHand.addEventListener('pinchended', () => {
            this.rightPinched = false;
          });

          // LEFT HAND EVENTS (Steering)
          this.leftHand.addEventListener('pinchstarted', () => {
            this.leftPinched = true;
            this.initialLeftRoll = this.getHandRoll(this.leftHand);
          });
          this.leftHand.addEventListener('pinchended', () => {
            this.leftPinched = false;
          });
        },

        tick: function (time, deltaTime) {
          if (!deltaTime) return;
          const dt = deltaTime / 1000; 
          
          let throttlePercent = 0;
          let turnDirectionText = "STRAIGHT";
          let debugRight = 0;
          let debugLeft = 0;

          // 1. RIGHT HAND: ACCELERATION (Twist wrist)
          if (this.rightPinched && this.rightHand) {
            let currentPitch = this.getHandPitch(this.rightHand);
            
            // FIX: Use Absolute value. Twisting up OR down will now successfully trigger the throttle.
            // This bypasses any issues with how specific headsets interpret axis directions.
            let pitchDiff = Math.abs(currentPitch - this.initialRightPitch);
            
            debugRight = pitchDiff;

            if (pitchDiff > this.data.deadzone) {
              // Normalize throttle to a 0.0 - 1.0 range based on twist amount
              let throttle = Math.min((pitchDiff - this.data.deadzone) / 0.4, 1.0);
              throttlePercent = Math.round(throttle * 100);
              this.speed += throttle * this.data.acceleration * dt;
            }
          }

          // 2. LEFT HAND: STEERING (Tilt wrist)
          if (this.leftPinched && this.leftHand) {
            let currentRoll = this.getHandRoll(this.leftHand);
            let rollDiff = currentRoll - this.initialLeftRoll;
            
            debugLeft = rollDiff;

            if (Math.abs(rollDiff) > this.data.deadzone) {
              let turnIntensity = (Math.abs(rollDiff) - this.data.deadzone) * Math.sign(rollDiff);
              
              // Rotate rig: minus sign ensures natural leaning physics
              this.el.object3D.rotation.y -= turnIntensity * this.data.turnSensitivity * dt;
              
              turnDirectionText = turnIntensity > 0 ? "RIGHT" : "LEFT";
            }
          }

          // 3. BRAKING LOGIC
          if (!this.rightPinched && !this.leftPinched) {
            // HARD BRAKE
            this.speed *= Math.pow(0.001, dt); 
            turnDirectionText = "BRAKING!";
          } else if (!this.rightPinched) {
            // COASTING
            this.speed *= Math.pow(0.3, dt);
          }

          if (this.speed > this.data.maxSpeed) this.speed = this.data.maxSpeed;
          if (this.speed < 0.05) this.speed = 0;

          // 4. MOVE THE BIKE FORWARD (Explicit World Vector)
          if (this.speed > 0) {
            // FIX: Explicitly calculate forward vector on the ground plane.
            // This prevents A-Frame/WebXR local transform conflicts from stopping movement.
            let forward = new THREE.Vector3(0, 0, -1);
            forward.applyQuaternion(this.el.object3D.quaternion);
            forward.y = 0; // Lock strictly to the ground
            
            if (forward.lengthSq() > 0) {
                forward.normalize();
                this.el.object3D.position.addScaledVector(forward, this.speed * dt);
            }
          }

          // 5. UPDATE DASHBOARD UI
          if (this.odoText) {
            let displaySpeed = Math.round(this.speed * 10) / 10;
            
            let color = '#00FF00'; // Green while riding
            if (!this.rightPinched && !this.leftPinched) color = '#FF4444'; // Red while braking
            
            let statusText = "PINCH RIGHT HAND TO START";
            if (this.rightPinched || this.leftPinched) statusText = `[ ${turnDirectionText} ]`;
            
            // Format debug string so it's readable
            let dRightStr = debugRight.toFixed(2);
            let dLeftStr = (debugLeft > 0 ? "+" : "") + debugLeft.toFixed(2);

            this.odoText.setAttribute('value', 
              `${statusText}\nTHROTTLE: ${throttlePercent}%\nSPEED: ${displaySpeed}m/s\n\n(Debug: Twist=${dRightStr}, Tilt=${dLeftStr})`
            );
            this.odoText.setAttribute('color', color);
          }
        }
      });
    </script>
  </head>
  <body>
    <a-scene background="color: #87CEEB">
      
      <!-- PLAYER RIG -->
      <a-entity id="rig" position="0 0 0" motorcycle-rig>
        
        <!-- Camera with HUD -->
        <a-camera id="camera" position="0 1.6 0">
          <!-- Odometer attached to Camera so it acts like a HUD -->
          <a-entity id="odometer" position="0 -0.2 -0.6" rotation="-15 0 0">
             <a-plane width="0.8" height="0.4" color="#111111" opacity="0.85"></a-plane>
             <a-text id="odo-text" 
                     value="WAITING FOR HANDS..." 
                     align="center" 
                     position="0 0 0.01" 
                     color="#FF4444" 
                     width="1.2"
                     font="monoid">
             </a-text>
          </a-entity>
        </a-camera>
        
        <!-- Left Hand -->
        <a-entity id="leftHand" hand-tracking-controls="hand: left; modelColor: #cbd5e1;"></a-entity>
        
        <!-- Right Hand -->
        <a-entity id="rightHand" hand-tracking-controls="hand: right; modelColor: #cbd5e1;"></a-entity>
      </a-entity>

      <!-- ENVIRONMENT -->
      <a-plane position="0 0.01 0" rotation="-90 0 0" width="6" height="2000" color="#333333"></a-plane>
      <a-plane position="0 0.02 0" rotation="-90 0 0" width="0.2" height="2000" color="#FFFFFF"></a-plane>
      <a-plane position="0 0 0" rotation="-90 0 0" width="2000" height="2000" color="#5C7A4A"></a-plane>
      <a-entity forest-scenery></a-entity>
      <a-light type="ambient" color="#fff" intensity="0.6"></a-light>
      <a-light type="directional" position="-2 5 -2" intensity="0.5" castShadow="true"></a-light>

    </a-scene>
  </body>
</html>
